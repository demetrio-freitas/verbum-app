<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Verbum — Boa Noite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
<style>
/* ========================================
   DESIGN TOKENS — BOA NOITE
   ======================================== */
:root {
  --bg-night: #0A0A1A;
  --bg-card: #151525;
  --bg-card-hover: #1C1C35;
  --bg-surface: #1A1A2E;
  --bg-controls: #12122A;
  --gold: #D4A853;
  --gold-dim: #B8923F;
  --gold-glow: rgba(212, 168, 83, 0.15);
  --gold-glow-strong: rgba(212, 168, 83, 0.3);
  --text-primary: #F0EDE6;
  --text-secondary: #8A8698;
  --text-tertiary: #5A5670;
  --white: #FFFFFF;
  --progress-bg: #2A2A45;
  --chip-bg: #1E1E38;
  --chip-active: #D4A853;
  --chip-active-text: #0A0A1A;
  --slider-track: #2A2A45;
  --slider-fill: #D4A853;
  --font-display: 'Cormorant Garamond', serif;
  --font-body: 'DM Sans', sans-serif;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-full: 50%;
  --shadow-glow: 0 0 40px rgba(212, 168, 83, 0.08);
  --transition-fast: 0.2s ease;
  --transition-medium: 0.35s ease;
  --transition-slow: 0.6s ease;
}

/* ========================================
   RESET & BASE
   ======================================== */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: var(--font-body);
  background: var(--bg-night);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.material-symbols-rounded {
  font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  vertical-align: middle;
}

/* ========================================
   STARS BACKGROUND
   ======================================== */
.stars-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: var(--gold);
  border-radius: 50%;
  animation: twinkle var(--dur) ease-in-out infinite;
  animation-delay: var(--delay);
  opacity: 0;
}

@keyframes twinkle {
  0%, 100% { opacity: 0; }
  50% { opacity: var(--max-opacity); }
}

/* ========================================
   CATALOG SCREEN
   ======================================== */
#catalog {
  position: relative;
  height: 100vh;
  overflow-y: auto;
  overflow-x: hidden;
  z-index: 1;
  transition: opacity var(--transition-slow), transform var(--transition-slow);
  -webkit-overflow-scrolling: touch;
}

#catalog.hidden {
  opacity: 0;
  transform: scale(0.95);
  pointer-events: none;
  position: absolute;
  inset: 0;
}

/* Header */
.catalog-header {
  padding: 56px 20px 20px;
  text-align: center;
  position: relative;
}

.catalog-header .moon-icon {
  font-size: 40px;
  color: var(--gold);
  display: block;
  margin-bottom: 8px;
  filter: drop-shadow(0 0 12px var(--gold-glow-strong));
}

.catalog-header h1 {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: 36px;
  color: var(--gold);
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.catalog-header p {
  font-size: 14px;
  color: var(--text-secondary);
  font-weight: 300;
  letter-spacing: 0.3px;
}

/* Continue Listening */
.continue-section {
  padding: 0 16px 8px;
  display: none;
}

.continue-section.visible {
  display: block;
}

.continue-section .section-label {
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-tertiary);
  margin-bottom: 10px;
}

.continue-card {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--bg-card);
  border: 1px solid rgba(212, 168, 83, 0.12);
  border-radius: var(--radius-lg);
  padding: 12px;
  cursor: pointer;
  transition: background var(--transition-fast), border-color var(--transition-fast);
}

.continue-card:active {
  background: var(--bg-card-hover);
  border-color: rgba(212, 168, 83, 0.25);
}

.continue-thumb {
  width: 56px;
  height: 56px;
  border-radius: var(--radius-md);
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}

.continue-thumb .play-badge {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.35);
}

.continue-thumb .play-badge .material-symbols-rounded {
  font-size: 24px;
  color: var(--white);
}

.continue-info {
  flex: 1;
  min-width: 0;
}

.continue-info .title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.continue-info .meta {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
}

.continue-progress {
  height: 3px;
  background: var(--progress-bg);
  border-radius: 2px;
  margin-top: 8px;
  overflow: hidden;
}

.continue-progress .fill {
  height: 100%;
  background: var(--gold);
  border-radius: 2px;
  transition: width 0.3s ease;
}

/* Category Chips */
.category-bar {
  display: flex;
  gap: 8px;
  padding: 16px 16px 12px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.category-bar::-webkit-scrollbar {
  display: none;
}

.category-chip {
  flex-shrink: 0;
  padding: 7px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 400;
  color: var(--text-secondary);
  background: var(--chip-bg);
  border: 1px solid transparent;
  cursor: pointer;
  transition: all var(--transition-fast);
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  font-family: var(--font-body);
}

.category-chip.active {
  color: var(--chip-active-text);
  background: var(--chip-active);
  font-weight: 500;
}

.category-chip:not(.active):active {
  background: var(--bg-card-hover);
}

/* Story Grid */
.story-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 8px 16px 100px;
}

.story-card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: transform var(--transition-fast), box-shadow var(--transition-fast);
  -webkit-tap-highlight-color: transparent;
  position: relative;
}

.story-card:active {
  transform: scale(0.97);
}

.story-card.hidden {
  display: none;
}

/* Thumbnail */
.story-thumb {
  width: 100%;
  aspect-ratio: 1;
  position: relative;
  overflow: hidden;
}

.story-thumb .gradient-bg {
  position: absolute;
  inset: 0;
}

.story-thumb .thumb-icon {
  position: absolute;
  bottom: 10px;
  right: 10px;
  font-size: 32px;
  color: rgba(255,255,255,0.3);
}

.story-thumb .badge {
  position: absolute;
  top: 8px;
  left: 8px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  padding: 3px 8px;
  border-radius: 6px;
  background: var(--gold);
  color: var(--bg-night);
}

.story-thumb .badge-premium {
  background: rgba(255,255,255,0.15);
  color: var(--text-secondary);
  backdrop-filter: blur(8px);
}

.story-thumb .ambient-badge {
  position: absolute;
  bottom: 8px;
  left: 8px;
  display: flex;
  align-items: center;
  gap: 3px;
  font-size: 10px;
  color: rgba(255,255,255,0.6);
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(6px);
  padding: 3px 7px;
  border-radius: 6px;
}

.story-thumb .ambient-badge .material-symbols-rounded {
  font-size: 13px;
}

/* Listened state */
.story-card.listened .story-thumb::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(10, 10, 26, 0.4);
}

.story-card .listened-check {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--gold);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
  display: none;
}

.story-card .listened-check .material-symbols-rounded {
  font-size: 14px;
  color: var(--bg-night);
}

.story-card.listened .listened-check {
  display: flex;
}

/* Card Info */
.story-info {
  padding: 10px 10px 12px;
}

.story-info .title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  line-height: 1.3;
  margin-bottom: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.story-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-tertiary);
}

.story-meta .dot {
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--text-tertiary);
}

/* In-progress mini bar */
.story-card .mini-progress {
  height: 2px;
  background: var(--progress-bg);
  margin: 0 10px 8px;
  border-radius: 1px;
  display: none;
}

.story-card .mini-progress .fill {
  height: 100%;
  background: var(--gold);
  border-radius: 1px;
}

.story-card.in-progress .mini-progress {
  display: block;
}

/* Gradients for thumbnails */
.grad-blue { background: linear-gradient(135deg, #1a237e 0%, #0d47a1 50%, #1565c0 100%); }
.grad-green { background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #388e3c 100%); }
.grad-amber { background: linear-gradient(135deg, #e65100 0%, #f57c00 50%, #ff9800 100%); }
.grad-purple { background: linear-gradient(135deg, #4a148c 0%, #6a1b9a 50%, #7b1fa2 100%); }
.grad-red { background: linear-gradient(135deg, #b71c1c 0%, #c62828 50%, #d32f2f 100%); }
.grad-teal { background: linear-gradient(135deg, #004d40 0%, #00695c 50%, #00796b 100%); }

/* ========================================
   PLAYER SCREEN
   ======================================== */
#player {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: var(--bg-night);
  display: flex;
  flex-direction: column;
  opacity: 0;
  transform: scale(1.05);
  pointer-events: none;
  transition: opacity var(--transition-slow), transform var(--transition-slow);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

#player.active {
  opacity: 1;
  transform: scale(1);
  pointer-events: auto;
}

/* Player stars */
#player .stars-container {
  z-index: 0;
  transition: opacity 2s ease;
}

#player.fading .stars-container {
  opacity: 0;
}

/* Radial glow behind artwork */
.player-glow {
  position: absolute;
  top: 10%;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* Player header */
.player-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 52px 20px 0;
  position: relative;
  z-index: 2;
}

.btn-close {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-full);
  border: none;
  background: rgba(255,255,255,0.08);
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background var(--transition-fast);
  -webkit-tap-highlight-color: transparent;
}

.btn-close:active {
  background: rgba(255,255,255,0.15);
}

.player-category {
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 400;
  letter-spacing: 0.5px;
}

/* Artwork */
.player-artwork-wrap {
  display: flex;
  justify-content: center;
  padding: 32px 0 24px;
  position: relative;
  z-index: 2;
}

.player-artwork {
  width: 200px;
  height: 200px;
  border-radius: var(--radius-full);
  border: 2px solid var(--gold-dim);
  box-shadow: 0 0 50px var(--gold-glow), inset 0 0 30px rgba(0,0,0,0.3);
  position: relative;
  overflow: hidden;
}

.player-artwork .gradient-bg {
  position: absolute;
  inset: 0;
}

.player-artwork .artwork-icon {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 64px;
  color: rgba(255,255,255,0.2);
}

.player-artwork.playing {
  animation: artworkPulse 4s ease-in-out infinite;
}

@keyframes artworkPulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 50px var(--gold-glow), inset 0 0 30px rgba(0,0,0,0.3); }
  50% { transform: scale(1.03); box-shadow: 0 0 70px var(--gold-glow-strong), inset 0 0 30px rgba(0,0,0,0.3); }
}

/* Player info */
.player-info {
  text-align: center;
  padding: 0 24px 20px;
  position: relative;
  z-index: 2;
}

.player-info .title {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 400;
  color: var(--gold);
  margin-bottom: 6px;
}

.player-info .subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  font-weight: 300;
  font-style: italic;
  line-height: 1.4;
  margin-bottom: 4px;
}

.player-info .voice-label {
  font-size: 11px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Progress bar */
.player-progress {
  padding: 0 24px;
  position: relative;
  z-index: 2;
}

.progress-track {
  width: 100%;
  height: 4px;
  background: var(--progress-bg);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
  -webkit-tap-highlight-color: transparent;
}

.progress-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 2px;
  width: 0%;
  transition: width 0.3s linear;
  position: relative;
}

.progress-fill::after {
  content: '';
  position: absolute;
  right: -5px;
  top: 50%;
  transform: translateY(-50%);
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0;
  transition: opacity var(--transition-fast);
}

.progress-track:hover .progress-fill::after,
.progress-track:active .progress-fill::after {
  opacity: 1;
}

.progress-times {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 6px;
  font-variant-numeric: tabular-nums;
}

/* Playback controls */
.playback-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 20px 0;
  position: relative;
  z-index: 2;
}

.btn-skip {
  width: 44px;
  height: 44px;
  border-radius: var(--radius-full);
  border: none;
  background: transparent;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: color var(--transition-fast);
  -webkit-tap-highlight-color: transparent;
  position: relative;
}

.btn-skip:active {
  color: var(--text-primary);
}

.btn-skip .skip-label {
  position: absolute;
  bottom: -2px;
  font-size: 9px;
  color: var(--text-tertiary);
  font-weight: 500;
}

.btn-play {
  width: 64px;
  height: 64px;
  border-radius: var(--radius-full);
  border: 2px solid var(--gold);
  background: rgba(212, 168, 83, 0.1);
  color: var(--gold);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all var(--transition-fast);
  -webkit-tap-highlight-color: transparent;
}

.btn-play:active {
  background: rgba(212, 168, 83, 0.25);
  transform: scale(0.95);
}

.btn-play .material-symbols-rounded {
  font-size: 32px;
}

.btn-speed {
  padding: 4px 10px;
  border-radius: 12px;
  border: 1px solid var(--text-tertiary);
  background: transparent;
  color: var(--text-tertiary);
  font-size: 11px;
  font-weight: 500;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all var(--transition-fast);
  -webkit-tap-highlight-color: transparent;
  position: absolute;
  right: 24px;
}

.btn-speed:active {
  border-color: var(--gold);
  color: var(--gold);
}

/* ========================================
   SLEEP CONTROLS
   ======================================== */
.sleep-controls {
  background: var(--bg-controls);
  border-top: 1px solid rgba(255,255,255,0.04);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  padding: 20px 24px 40px;
  margin-top: auto;
  position: relative;
  z-index: 2;
}

/* Ambient sound */
.ambient-section {
  margin-bottom: 24px;
}

.ambient-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}

.ambient-header .material-symbols-rounded {
  font-size: 18px;
  color: var(--gold-dim);
}

.ambient-header .label {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 400;
}

.ambient-header .ambient-name {
  color: var(--text-primary);
  font-weight: 500;
}

/* Custom slider */
input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 4px;
  border-radius: 2px;
  background: var(--slider-track);
  outline: none;
  margin: 0;
  cursor: pointer;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 10px var(--gold-glow-strong);
  cursor: pointer;
  border: none;
}

input[type="range"]::-moz-range-thumb {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 10px var(--gold-glow-strong);
  cursor: pointer;
  border: none;
}

.ambient-volume-label {
  text-align: right;
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 4px;
  font-variant-numeric: tabular-nums;
}

/* Timer */
.timer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.timer-header .left {
  display: flex;
  align-items: center;
  gap: 8px;
}

.timer-header .material-symbols-rounded {
  font-size: 18px;
  color: var(--gold-dim);
}

.timer-header .label {
  font-size: 13px;
  color: var(--text-secondary);
}

.timer-countdown {
  font-size: 12px;
  color: var(--gold);
  font-variant-numeric: tabular-nums;
  font-weight: 500;
  opacity: 0;
  transition: opacity var(--transition-fast);
}

.timer-countdown.visible {
  opacity: 1;
}

.timer-chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.timer-chip {
  padding: 7px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 400;
  font-family: var(--font-body);
  color: var(--text-secondary);
  background: var(--chip-bg);
  border: 1px solid transparent;
  cursor: pointer;
  transition: all var(--transition-fast);
  -webkit-tap-highlight-color: transparent;
}

.timer-chip.active {
  color: var(--chip-active-text);
  background: var(--chip-active);
  font-weight: 500;
}

.timer-chip:not(.active):active {
  background: var(--bg-card-hover);
}

/* ========================================
   TOAST
   ======================================== */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  padding: 12px 24px;
  background: var(--bg-surface);
  border: 1px solid rgba(212, 168, 83, 0.2);
  border-radius: var(--radius-xl);
  font-size: 15px;
  color: var(--gold);
  font-family: var(--font-display);
  font-weight: 400;
  letter-spacing: 0.5px;
  opacity: 0;
  pointer-events: none;
  transition: all var(--transition-medium);
  z-index: 200;
  white-space: nowrap;
}

.toast.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ========================================
   SCROLLBAR
   ======================================== */
::-webkit-scrollbar {
  width: 0;
}

/* ========================================
   RESPONSIVE
   ======================================== */
@media (min-width: 420px) {
  .story-grid {
    max-width: 400px;
    margin: 0 auto;
  }

<!-- ========================================
     JAVASCRIPT

<script>

var stories = [

  {

    voice: 'Narra\u00e7\u00e3o feminina',
    ambientSound: 'chant',
    ambientLabel: 'Cantos gregorianos',
    ambientIcon: 'music_note',
    gradient: 'grad-teal',
    thumbIcon: 'candle',
    isNew: true,
    isPremium: false
  }
];

// ========================================
// STATE
// ========================================
var currentStory = null;
var isPlaying = false;
var currentTime = 0;
var playbackSpeed = 1;
var playInterval = null;
var ambientVolume = 40;
var timerMinutes = 0;
var timerRemaining = 0;
var timerInterval = null;
var audioCtx = null;
var ambientNodes = {};

var STORAGE_KEY = 'verbum_boa_noite';

// ========================================
// PERSISTENCE
// ========================================
function loadProgress() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch (e) { return {}; }
}

function saveProgress() {
  if (!currentStory) return;
  var data = loadProgress();
  data[currentStory.id] = { time: currentTime, duration: currentStory.duration };
  data._prefs = { timer: timerMinutes, ambient: ambientVolume };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function getStoryProgress(id) {
  var data = loadProgress();
  return data[id] || null;
}

function getPrefs() {
  var data = loadProgress();
  return data._prefs || { timer: 0, ambient: 40 };
}

// ========================================
// UTILS
// ========================================
function formatTime(sec) {
  sec = Math.round(sec);
  var m = Math.floor(sec / 60);
  var s = sec % 60;
  return m + ':' + (s < 10 ? '0' : '') + s;
}

function formatDuration(sec) {
  return Math.round(sec / 60) + ' min';
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.textContent;
}

// ========================================
// STARS
// ========================================
function createStars(container, count) {
  while (container.firstChild) {
    container.removeChild(container.firstChild);
  }
  for (var i = 0; i < count; i++) {
    var star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--dur', (3 + Math.random() * 4) + 's');
    star.style.setProperty('--delay', Math.random() * 5 + 's');
    star.style.setProperty('--max-opacity', (0.2 + Math.random() * 0.5).toFixed(2));
    if (Math.random() > 0.7) {
      star.style.width = '3px';
      star.style.height = '3px';
    }
    container.appendChild(star);
  }
}

// ========================================
// CATALOG RENDER
// ========================================
function renderCatalog() {
  var grid = document.getElementById('storyGrid');
  while (grid.firstChild) {
    grid.removeChild(grid.firstChild);
  }

  stories.forEach(function(story) {
    var progress = getStoryProgress(story.id);
    var isListened = progress && progress.time >= progress.duration - 5;
    var inProgress = progress && !isListened && progress.time > 10;
    var progressPct = progress ? Math.round((progress.time / progress.duration) * 100) : 0;

    var card = document.createElement('div');
    card.className = 'story-card';
    if (isListened) card.className += ' listened';
    if (inProgress) card.className += ' in-progress';
    card.dataset.cat = story.category;

    // Build card structure using DOM
    var thumb = document.createElement('div');
    thumb.className = 'story-thumb';

    var gradBg = document.createElement('div');
    gradBg.className = 'gradient-bg ' + story.gradient;
    thumb.appendChild(gradBg);

    var thumbIcon = document.createElement('span');
    thumbIcon.className = 'material-symbols-rounded thumb-icon';
    thumbIcon.textContent = story.thumbIcon;
    thumb.appendChild(thumbIcon);

    if (story.isNew) {
      var badge = document.createElement('span');
      badge.className = 'badge';
      badge.textContent = 'Novo';
      thumb.appendChild(badge);
    }

    if (story.isPremium) {
      var premBadge = document.createElement('span');
      premBadge.className = 'badge badge-premium';
      premBadge.textContent = 'Premium';
      thumb.appendChild(premBadge);
    }

    var ambBadge = document.createElement('div');
    ambBadge.className = 'ambient-badge';
    var ambBadgeIcon = document.createElement('span');
    ambBadgeIcon.className = 'material-symbols-rounded';
    ambBadgeIcon.textContent = story.ambientIcon;
    ambBadge.appendChild(ambBadgeIcon);
    ambBadge.appendChild(document.createTextNode(' ' + story.ambientLabel));
    thumb.appendChild(ambBadge);

    var listenedCheck = document.createElement('div');
    listenedCheck.className = 'listened-check';
    var checkIcon = document.createElement('span');
    checkIcon.className = 'material-symbols-rounded';
    checkIcon.textContent = 'check';
    listenedCheck.appendChild(checkIcon);
    thumb.appendChild(listenedCheck);

    card.appendChild(thumb);

    var info = document.createElement('div');
    info.className = 'story-info';
    var titleEl = document.createElement('div');
    titleEl.className = 'title';
    titleEl.textContent = story.title;
    info.appendChild(titleEl);

    var meta = document.createElement('div');
    meta.className = 'story-meta';
    var durSpan = document.createElement('span');
    durSpan.textContent = formatDuration(story.duration);
    meta.appendChild(durSpan);
    var dot = document.createElement('span');
    dot.className = 'dot';
    meta.appendChild(dot);
    var voiceSpan = document.createElement('span');
    voiceSpan.textContent = story.voice.replace('Narra\u00e7\u00e3o ', '');
    meta.appendChild(voiceSpan);
    info.appendChild(meta);

    card.appendChild(info);

    var miniProg = document.createElement('div');
    miniProg.className = 'mini-progress';
    var miniFill = document.createElement('div');
    miniFill.className = 'fill';
    miniFill.style.width = progressPct + '%';
    miniProg.appendChild(miniFill);
    card.appendChild(miniProg);

    (function(s) {
      card.addEventListener('click', function() { openPlayer(s); });
    })(story);

    grid.appendChild(card);
  });

  updateContinueSection();
}

function renderCategoryBar() {
  var bar = document.getElementById('categoryBar');
  var cats = [
    { key: 'todas', label: 'Todas' },
    { key: 'salmos', label: 'Salmos' },
    { key: 'parabolas', label: 'Par\u00e1bolas' },
    { key: 'antigo-testamento', label: 'Antigo Testamento' },
    { key: 'santos', label: 'Santos Brasileiros' },
    { key: 'sazonal', label: 'Sazonal' }
  ];
  cats.forEach(function(cat, i) {
    var chip = document.createElement('button');
    chip.className = 'category-chip' + (i === 0 ? ' active' : '');
    chip.dataset.cat = cat.key;
    chip.textContent = cat.label;
    chip.addEventListener('click', function() { filterCategory(cat.key, chip); });
    bar.appendChild(chip);
  });
}

function renderTimerChips() {
  var container = document.getElementById('timerChips');
  var values = [10, 15, 20, 30, 45, 60, 0];
  values.forEach(function(min) {
    var chip = document.createElement('button');
    chip.className = 'timer-chip' + (min === 0 ? ' active' : '');
    chip.dataset.min = min;
    chip.textContent = min === 0 ? '\u221E' : min;
    chip.addEventListener('click', function() { setTimer(min, chip); });
    container.appendChild(chip);
  });
}

function updateContinueSection() {
  var data = loadProgress();
  var lastStory = null;
  var lastProgress = null;

  stories.forEach(function(story) {
    var p = data[story.id];
    if (p && p.time > 10 && p.time < p.duration - 5) {
      if (!lastProgress || p.time > lastProgress.time) {
        lastStory = story;
        lastProgress = p;
      }
    }
  });

  var section = document.getElementById('continueSection');
  if (lastStory && lastProgress) {
    section.classList.add('visible');

    var thumbEl = document.getElementById('continueThumb');
    while (thumbEl.firstChild) thumbEl.removeChild(thumbEl.firstChild);
    var gradBg = document.createElement('div');
    gradBg.className = 'gradient-bg ' + lastStory.gradient;
    thumbEl.appendChild(gradBg);
    var playBadge = document.createElement('div');
    playBadge.className = 'play-badge';
    var playIcon = document.createElement('span');
    playIcon.className = 'material-symbols-rounded';
    playIcon.textContent = 'play_arrow';
    playBadge.appendChild(playIcon);
    thumbEl.appendChild(playBadge);

    document.getElementById('continueTitle').textContent = lastStory.title;
    document.getElementById('continueMeta').textContent =
      formatTime(lastProgress.time) + ' / ' + formatDuration(lastStory.duration);
    document.getElementById('continueFill').style.width =
      Math.round((lastProgress.time / lastProgress.duration) * 100) + '%';
    section.dataset.storyId = lastStory.id;
  } else {
    section.classList.remove('visible');
  }
}

function filterCategory(cat, btn) {
  var chips = document.querySelectorAll('.category-chip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
  btn.classList.add('active');

  var cards = document.querySelectorAll('.story-card');
  for (var j = 0; j < cards.length; j++) {
    if (cat === 'todas' || cards[j].dataset.cat === cat) {
      cards[j].classList.remove('hidden');
    } else {
      cards[j].classList.add('hidden');
    }
  }
}

// ========================================
// PLAYER
// ========================================
function openPlayer(story) {
  currentStory = story;
  var progress = getStoryProgress(story.id);
  currentTime = (progress && progress.time < story.duration - 5) ? progress.time : 0;

  document.getElementById('playerCategory').textContent = story.categoryLabel;
  document.getElementById('playerGradient').className = 'gradient-bg ' + story.gradient;
  document.getElementById('playerArtworkIcon').textContent = story.thumbIcon;
  document.getElementById('playerTitle').textContent = story.title;
  document.getElementById('playerSubtitle').textContent = story.subtitle;
  document.getElementById('playerVoice').textContent = story.voice;
  document.getElementById('ambientIcon').textContent = story.ambientIcon;
  document.getElementById('ambientName').textContent = story.ambientLabel;
  document.getElementById('timeDuration').textContent = formatTime(story.duration);

  var prefs = getPrefs();
  ambientVolume = prefs.ambient;
  document.getElementById('ambientSlider').value = ambientVolume;
  document.getElementById('ambientVolumeLabel').textContent = ambientVolume + '%';
  updateSliderFill();

  timerMinutes = prefs.timer || 0;
  timerRemaining = 0;
  var tChips = document.querySelectorAll('.timer-chip');
  for (var i = 0; i < tChips.length; i++) {
    tChips[i].classList.toggle('active', parseInt(tChips[i].dataset.min) === timerMinutes);
  }
  document.getElementById('timerCountdown').classList.remove('visible');

  updatePlayerUI();

  document.getElementById('catalog').classList.add('hidden');
  document.getElementById('player').classList.add('active');
  document.getElementById('player').classList.remove('fading');

  createStars(document.getElementById('playerStars'), 20);

  setTimeout(function() { togglePlay(); }, 400);
}

function closePlayer() {
  stopPlay();
  stopAmbient();
  clearTimerInterval();
  saveProgress();
  document.getElementById('player').classList.remove('active');
  document.getElementById('catalog').classList.remove('hidden');
  renderCatalog();
}

function updatePlayerUI() {
  var pct = currentStory ? (currentTime / currentStory.duration) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('timeCurrent').textContent = formatTime(currentTime);
}

// ========================================
// PLAYBACK
// ========================================
function togglePlay() {
  if (isPlaying) {
    stopPlay();
    stopAmbient();
    clearTimerInterval();
  } else {
    startPlay();
    startAmbient();
    if (timerMinutes > 0 && timerRemaining <= 0) {
      timerRemaining = timerMinutes * 60;
    }
    if (timerMinutes > 0) startTimerInterval();
  }
}

function startPlay() {
  isPlaying = true;
  document.getElementById('playIcon').textContent = 'pause';
  document.getElementById('playerArtwork').classList.add('playing');

  playInterval = setInterval(function() {
    currentTime += playbackSpeed;
    if (currentTime >= currentStory.duration) {
      currentTime = currentStory.duration;
      finishStory();
      return;
    }
    updatePlayerUI();
    if (Math.round(currentTime) % 10 === 0) saveProgress();
  }, 1000);
}

function stopPlay() {
  isPlaying = false;
  document.getElementById('playIcon').textContent = 'play_arrow';
  document.getElementById('playerArtwork').classList.remove('playing');
  clearInterval(playInterval);
  playInterval = null;
  saveProgress();
}

function skip(seconds) {
  if (!currentStory) return;
  currentTime = Math.max(0, Math.min(currentStory.duration, currentTime + seconds));
  updatePlayerUI();
}

function seekAudio(e) {
  if (!currentStory) return;
  var track = document.getElementById('progressTrack');
  var rect = track.getBoundingClientRect();
  var pct = (e.clientX - rect.left) / rect.width;
  currentTime = Math.max(0, Math.min(currentStory.duration, pct * currentStory.duration));
  updatePlayerUI();
}

function cycleSpeed() {
  var speeds = [0.75, 1, 1.25];
  var idx = speeds.indexOf(playbackSpeed);
  playbackSpeed = speeds[(idx + 1) % speeds.length];
  document.getElementById('btnSpeed').textContent = playbackSpeed + 'x';
}

function finishStory() {
  stopPlay();
  stopAmbient();
  clearTimerInterval();
  saveProgress();
  showToast('Boa noite \u2726');
  setTimeout(function() { closePlayer(); }, 3000);
}

// ========================================
// AMBIENT SOUND (Web Audio API)
// ========================================
function getAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function startAmbient() {
  if (!currentStory || ambientVolume === 0) return;
  var ctx = getAudioContext();
  if (ctx.state === 'suspended') ctx.resume();
  stopAmbient();

  var type = currentStory.ambientSound;
  var gainNode = ctx.createGain();
  gainNode.gain.value = ambientVolume / 200;
  gainNode.connect(ctx.destination);

  if (type === 'rain' || type === 'night') {
    var bufferSize = 2 * ctx.sampleRate;
    var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    var data = buffer.getChannelData(0);
    var lastOut = 0;
    for (var i = 0; i < bufferSize; i++) {
      var white = Math.random() * 2 - 1;
      data[i] = (lastOut + 0.02 * white) / 1.02;
      lastOut = data[i];
      data[i] *= 3.5;
    }
    var source = ctx.createBufferSource();
    source.buffer = buffer;
    source.loop = true;
    var filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = type === 'rain' ? 800 : 400;
    source.connect(filter);
    filter.connect(gainNode);
    source.start();
    ambientNodes = { source: source, filter: filter, gain: gainNode };

  } else if (type === 'fire') {
    var bufSize = 2 * ctx.sampleRate;
    var buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    var d = buf.getChannelData(0);
    var lo = 0;
    for (var j = 0; j < bufSize; j++) {
      var w = Math.random() * 2 - 1;
      d[j] = (lo + 0.04 * w) / 1.04;
      lo = d[j];
      d[j] *= 2;
    }
    var src = ctx.createBufferSource();
    src.buffer = buf;
    src.loop = true;
    var flt = ctx.createBiquadFilter();
    flt.type = 'bandpass';
    flt.frequency.value = 600;
    flt.Q.value = 0.5;
    src.connect(flt);
    flt.connect(gainNode);
    src.start();
    ambientNodes = { source: src, filter: flt, gain: gainNode };

  } else if (type === 'bells') {
    function playBell() {
      if (!isPlaying) return;
      var osc = ctx.createOscillator();
      var bellGain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 400 + Math.random() * 400;
      bellGain.gain.setValueAtTime(ambientVolume / 600, ctx.currentTime);
      bellGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 3);
      osc.connect(bellGain);
      bellGain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 3);
      ambientNodes._bellTimeout = setTimeout(playBell, 4000 + Math.random() * 6000);
    }
    playBell();
    ambientNodes = { gain: gainNode, _bellTimeout: null };

  } else if (type === 'chant') {
    var freqs = [130.81, 164.81, 196.0];
    var oscs = freqs.map(function(f) {
      var osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = f;
      osc.connect(gainNode);
      osc.start();
      return osc;
    });
    ambientNodes = { oscs: oscs, gain: gainNode };
  }
}

function stopAmbient() {
  try {
    if (ambientNodes.source) ambientNodes.source.stop();
    if (ambientNodes.oscs) ambientNodes.oscs.forEach(function(o) { o.stop(); });
    if (ambientNodes._bellTimeout) clearTimeout(ambientNodes._bellTimeout);
    if (ambientNodes.gain) ambientNodes.gain.disconnect();
  } catch (e) {}
  ambientNodes = {};
}

function setAmbientVolume(val) {
  ambientVolume = parseInt(val);
  document.getElementById('ambientVolumeLabel').textContent = ambientVolume + '%';
  if (ambientNodes.gain) {
    ambientNodes.gain.gain.setTargetAtTime(ambientVolume / 200, getAudioContext().currentTime, 0.1);
  }
}

// ========================================
// SLEEP TIMER
// ========================================
function setTimer(min, btn) {
  var chips = document.querySelectorAll('.timer-chip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
  btn.classList.add('active');
  timerMinutes = min;
  clearTimerInterval();

  if (min === 0) {
    timerRemaining = 0;
    document.getElementById('timerCountdown').classList.remove('visible');
    if (ambientNodes.gain && isPlaying) {
      ambientNodes.gain.gain.setTargetAtTime(ambientVolume / 200, getAudioContext().currentTime, 0.5);
    }
    document.getElementById('player').classList.remove('fading');
  } else {
    timerRemaining = min * 60;
    if (isPlaying) startTimerInterval();
  }
}

function startTimerInterval() {
  clearTimerInterval();
  document.getElementById('timerCountdown').classList.add('visible');
  updateTimerDisplay();

  timerInterval = setInterval(function() {
    if (!isPlaying) return;
    timerRemaining--;

    if (timerRemaining <= 0) {
      clearTimerInterval();
      stopPlay();
      stopAmbient();
      showToast('Boa noite \u2726');
      setTimeout(function() { closePlayer(); }, 3000);
      return;
    }

    if (timerRemaining <= 120) {
      var fadeRatio = timerRemaining / 120;
      document.getElementById('player').classList.add('fading');
      if (ambientNodes.gain) {
        var targetVol = (ambientVolume / 200) * fadeRatio;
        ambientNodes.gain.gain.setTargetAtTime(targetVol, getAudioContext().currentTime, 0.5);
      }
    }

    updateTimerDisplay();
  }, 1000);
}

function clearTimerInterval() {
  clearInterval(timerInterval);
  timerInterval = null;
}

function updateTimerDisplay() {
  document.getElementById('timerCountdown').textContent =
    'Desligando em ' + formatTime(timerRemaining);
}

// ========================================
// TOAST
// ========================================
function showToast(msg) {
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('visible');
  setTimeout(function() { toast.classList.remove('visible'); }, 3000);
}

// ========================================
// SLIDER VISUAL FILL
// ========================================
var ambientSlider = document.getElementById('ambientSlider');

function updateSliderFill() {
  var val = ambientSlider.value;
  ambientSlider.style.background =
    'linear-gradient(to right, var(--gold) 0%, var(--gold) ' + val + '%, var(--slider-track) ' + val + '%, var(--slider-track) 100%)';
}

// ========================================
// EVENT LISTENERS
// ========================================
document.getElementById('btnClose').addEventListener('click', closePlayer);
document.getElementById('btnPlay').addEventListener('click', togglePlay);
document.getElementById('btnSkipBack').addEventListener('click', function() { skip(-15); });
document.getElementById('btnSkipFwd').addEventListener('click', function() { skip(15); });
document.getElementById('btnSpeed').addEventListener('click', cycleSpeed);
document.getElementById('progressTrack').addEventListener('click', seekAudio);
ambientSlider.addEventListener('input', function() {
  setAmbientVolume(this.value);
  updateSliderFill();
});

document.getElementById('continueCard').addEventListener('click', function() {
  var section = document.getElementById('continueSection');
  var id = section.dataset.storyId;
  var story = stories.filter(function(s) { return s.id === id; })[0];
  if (story) openPlayer(story);
});

// ========================================
// INIT
// ========================================
createStars(document.getElementById('bgStars'), 25);
renderCategoryBar();
renderTimerChips();
renderCatalog();
updateSliderFill();
</script>
