<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Verbum — Bíblia Sagrada</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Nunito:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Space+Grotesk:wght@300;400;500;600;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   VERBUM BÍBLIA — Design Tokens
   Mesmo sistema do liturgia-app
   ═══════════════════════════════════════════ */
:root {
  --bg: #FAFAF7;
  --bg-card: #FFFFFF;
  --bg-elevated: #F2F1EC;
  --text-primary: #1C1917;
  --text-secondary: #57534E;
  --text-tertiary: #A8A29E;
  --accent: #78350F;
  --accent-light: #D97706;
  --accent-soft: rgba(120,53,15,0.06);
  --accent-glow: rgba(120,53,15,0.12);
  --gold: #B45309;
  --gold-light: rgba(180,83,9,0.08);
  --border: rgba(28,25,23,0.06);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.03);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.04);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.06);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --font-size-base: 16px;
  --font-scale: 1;
  --font-display: 'Cormorant Garamond', serif;
  --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --tracking-tight: -0.02em;
  --gospel-gradient: linear-gradient(145deg, #A0622B 0%, #78350F 100%);
  --green: #16A34A;
  --green-soft: rgba(22,163,74,0.08);
  --highlight-bg: rgba(217,119,6,0.12);
}

/* ═══ DARK MODE ═══ */
[data-theme="dark"] {
  --bg: #0C0A09;
  --bg-card: #1C1917;
  --bg-elevated: #292524;
  --text-primary: #FAFAF9;
  --text-secondary: #A8A29E;
  --text-tertiary: #57534E;
  --accent: #D97706;
  --accent-light: #F59E0B;
  --accent-soft: rgba(217,119,6,0.08);
  --accent-glow: rgba(217,119,6,0.12);
  --gold: #D97706;
  --gold-light: rgba(217,119,6,0.06);
  --border: rgba(250,250,249,0.06);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
  --gospel-gradient: linear-gradient(145deg, #B07030 0%, #78350F 100%);
  --highlight-bg: rgba(217,119,6,0.15);
}

/* ═══ TEMA: SERENIDADE ═══ */
[data-visual="serenidade"] {
  --bg: #F0F4F8; --bg-card: #FFFFFF; --bg-elevated: #E3EAF0;
  --text-primary: #1B2A3D; --text-secondary: #5A6F85; --text-tertiary: #8B9DB0;
  --accent: #3B6FA0; --accent-light: #7BA7D0;
  --accent-soft: rgba(59,111,160,0.08); --accent-glow: rgba(59,111,160,0.12);
  --gold: #B89B5E; --gold-light: rgba(184,155,94,0.1);
  --border: rgba(27,42,61,0.08);
  --shadow-sm: 0 1px 3px rgba(59,111,160,0.06);
  --shadow-md: 0 4px 16px rgba(59,111,160,0.08);
  --shadow-lg: 0 8px 32px rgba(59,111,160,0.1);
  --font-display: 'Playfair Display', serif; --font-body: 'Nunito', sans-serif;
  --gospel-gradient: linear-gradient(135deg, #3B6FA0 0%, #1B3A5C 100%);
}
[data-visual="serenidade"][data-theme="dark"] {
  --bg: #0E1620; --bg-card: #162030; --bg-elevated: #1E2D40;
  --text-primary: #D8E3EE; --text-secondary: #8B9DB0; --text-tertiary: #5A6F85;
  --accent: #7BA7D0; --accent-soft: rgba(123,167,208,0.1);
  --accent-glow: rgba(123,167,208,0.12); --border: rgba(216,227,238,0.08);
  --gospel-gradient: linear-gradient(135deg, #3B6FA0 0%, #0E1620 100%);
}

/* ═══ TEMA: JOVEM ═══ */
[data-visual="jovem"] {
  --bg: #F5F0FA; --bg-card: #FFFFFF; --bg-elevated: #EDE5F5;
  --text-primary: #1E1229; --text-secondary: #6B5A7D; --text-tertiary: #9A8AAD;
  --accent: #7C3AED; --accent-light: #A78BFA;
  --accent-soft: rgba(124,58,237,0.08); --accent-glow: rgba(124,58,237,0.12);
  --gold: #F59E0B; --gold-light: rgba(245,158,11,0.1);
  --border: rgba(30,18,41,0.07);
  --radius-sm: 12px; --radius-md: 16px; --radius-lg: 24px; --radius-xl: 32px;
  --font-display: 'Outfit', sans-serif; --font-body: 'Outfit', sans-serif;
  --gospel-gradient: linear-gradient(135deg, #7C3AED 0%, #4C1D95 100%);
}
[data-visual="jovem"][data-theme="dark"] {
  --bg: #110D1B; --bg-card: #1A1525; --bg-elevated: #241E32;
  --text-primary: #E8E0F0; --text-secondary: #9A8AAD; --text-tertiary: #6B5A7D;
  --accent: #A78BFA; --accent-soft: rgba(167,139,250,0.1);
  --accent-glow: rgba(167,139,250,0.12); --border: rgba(232,224,240,0.08);
  --gospel-gradient: linear-gradient(135deg, #7C3AED 0%, #110D1B 100%);
}

/* ═══ TEMA: MINIMALISTA ═══ */
[data-visual="minimalista"] {
  --bg: #FFFFFF; --bg-card: #FAFAFA; --bg-elevated: #F5F5F5;
  --text-primary: #111111; --text-secondary: #666666; --text-tertiary: #AAAAAA;
  --accent: #111111; --accent-light: #444444;
  --accent-soft: rgba(0,0,0,0.04); --accent-glow: rgba(0,0,0,0.08);
  --gold: #888888; --gold-light: rgba(0,0,0,0.04);
  --border: rgba(0,0,0,0.06);
  --shadow-sm: none; --shadow-md: none; --shadow-lg: 0 2px 8px rgba(0,0,0,0.06);
  --font-display: 'Space Grotesk', sans-serif; --font-body: 'Space Grotesk', sans-serif;
  --gospel-gradient: linear-gradient(135deg, #333 0%, #111 100%);
}
[data-visual="minimalista"][data-theme="dark"] {
  --bg: #0A0A0A; --bg-card: #141414; --bg-elevated: #1E1E1E;
  --text-primary: #E5E5E5; --text-secondary: #888888; --text-tertiary: #555555;
  --accent: #E5E5E5; --accent-soft: rgba(255,255,255,0.06);
  --accent-glow: rgba(255,255,255,0.08); --border: rgba(255,255,255,0.06);
  --gospel-gradient: linear-gradient(135deg, #555 0%, #222 100%);
}

/* ═══ TEMA: NATUREZA ═══ */
[data-visual="natureza"] {
  --bg: #F4F6F0; --bg-card: #FFFFFF; --bg-elevated: #E8ECE0;
  --text-primary: #1A2612; --text-secondary: #546342; --text-tertiary: #8A9878;
  --accent: #5B7A3D; --accent-light: #7DA358;
  --accent-soft: rgba(91,122,61,0.08); --accent-glow: rgba(91,122,61,0.12);
  --gold: #A07D3A; --gold-light: rgba(160,125,58,0.1);
  --border: rgba(26,38,18,0.06);
  --shadow-sm: 0 1px 3px rgba(91,122,61,0.05);
  --shadow-md: 0 4px 16px rgba(91,122,61,0.06);
  --shadow-lg: 0 8px 32px rgba(91,122,61,0.08);
  --font-display: 'Lora', serif; --font-body: 'Nunito', sans-serif;
  --gospel-gradient: linear-gradient(135deg, #5B7A3D 0%, #3A5225 100%);
}
[data-visual="natureza"][data-theme="dark"] {
  --bg: #0D1208; --bg-card: #161E10; --bg-elevated: #1E2A16;
  --text-primary: #D5DFC8; --text-secondary: #8A9878; --text-tertiary: #546342;
  --accent: #7DA358; --accent-soft: rgba(125,163,88,0.1);
  --accent-glow: rgba(125,163,88,0.12); --border: rgba(213,223,200,0.08);
  --gospel-gradient: linear-gradient(135deg, #5B7A3D 0%, #0D1208 100%);
}

/* ═══════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { font-size: calc(var(--font-size-base) * var(--font-scale)); }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh; min-height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  overflow-x: hidden;
  transition: background 0.4s, color 0.4s;
  position: relative;
}

.material-symbols-rounded {
  font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  vertical-align: middle;
}

/* ═══════════════════════════════════════════
   SCREENS
   ═══════════════════════════════════════════ */
.screen { display: none; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
.screen.active { display: flex; animation: fadeIn 0.3s ease; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }

/* ═══════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════ */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  padding: 14px 20px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
}

.header-left { display: flex; align-items: center; gap: 8px; }

.header-title {
  font-family: var(--font-display);
  font-size: 1.35rem; font-weight: 600;
  letter-spacing: var(--tracking-tight);
  color: var(--text-primary);
}

.header-subtitle {
  font-size: 0.75rem; color: var(--text-tertiary);
  font-weight: 500;
}

.header-actions { display: flex; align-items: center; gap: 4px; }

.icon-btn {
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  border: none; background: transparent;
  color: var(--text-secondary); border-radius: 50%;
  cursor: pointer; transition: all 0.15s;
  font-size: 0;
}
.icon-btn:hover { background: var(--accent-soft); color: var(--accent); }
.icon-btn .material-symbols-rounded { font-size: 22px; }

.back-btn {
  width: auto; padding: 0 4px 0 0; gap: 2px;
  display: flex; align-items: center;
  color: var(--accent); font-weight: 500;
  font-family: var(--font-body); font-size: 0.85rem;
  border: none; background: transparent; cursor: pointer;
}
.back-btn .material-symbols-rounded { font-size: 24px; }
.back-btn:hover { opacity: 0.8; }

/* ═══════════════════════════════════════════
   SEARCH BAR
   ═══════════════════════════════════════════ */
.search-container { padding: 12px 20px; }

.search-bar {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 10px 16px;
  transition: all 0.2s;
}
.search-bar:focus-within {
  border-color: var(--accent-glow);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.search-bar .material-symbols-rounded { font-size: 20px; color: var(--text-tertiary); }
.search-bar input {
  flex: 1; border: none; background: transparent; outline: none;
  font-family: var(--font-body); font-size: 0.9rem;
  color: var(--text-primary);
}
.search-bar input::placeholder { color: var(--text-tertiary); }

/* ═══════════════════════════════════════════
   INDEX SCREEN — Book Pills
   ═══════════════════════════════════════════ */
.index-content { padding: 0 20px 40px; overflow-y: auto; flex: 1; }

.testament-label {
  font-family: var(--font-display);
  font-size: 1.15rem; font-weight: 600;
  color: var(--text-primary);
  margin: 24px 0 6px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  letter-spacing: var(--tracking-tight);
}
.testament-label:first-child { margin-top: 8px; }

.category-group { margin-bottom: 16px; }

.category-label {
  font-size: 0.68rem; font-weight: 600;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin: 12px 0 8px;
}

.pills-row { display: flex; flex-wrap: wrap; gap: 8px; }

.book-pill {
  display: flex; align-items: center; justify-content: center;
  min-width: 44px; height: 36px;
  padding: 0 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 0.78rem; font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer; transition: all 0.15s;
  box-shadow: var(--shadow-sm);
}
.book-pill:hover {
  background: var(--accent-soft);
  border-color: var(--accent-glow);
  color: var(--accent);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
.book-pill:active { transform: translateY(0); }

.book-pill.gospel {
  background: var(--gospel-gradient);
  color: #FFF; border-color: transparent;
}
.book-pill.gospel:hover { opacity: 0.9; transform: translateY(-1px); }

/* ═══════════════════════════════════════════
   CHAPTERS SCREEN — Number Grid
   ═══════════════════════════════════════════ */
.chapters-content { padding: 20px; overflow-y: auto; flex: 1; }

.book-info { text-align: center; margin-bottom: 24px; }
.book-info h2 {
  font-family: var(--font-display);
  font-size: 1.6rem; font-weight: 600;
  color: var(--text-primary);
  letter-spacing: var(--tracking-tight);
}
.book-info .book-meta {
  font-size: 0.8rem; color: var(--text-tertiary);
  margin-top: 4px;
}

.chapters-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  max-width: 360px;
  margin: 0 auto;
}

.chapter-btn {
  aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: 0.95rem; font-weight: 500;
  color: var(--text-primary);
  cursor: pointer; transition: all 0.15s;
  box-shadow: var(--shadow-sm);
  position: relative;
}
.chapter-btn:hover {
  background: var(--accent-soft);
  border-color: var(--accent-glow);
  color: var(--accent);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
.chapter-btn:active { transform: translateY(0); }
.chapter-btn.has-text::after {
  content: ''; position: absolute; bottom: 4px;
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--accent-light);
}

/* ═══════════════════════════════════════════
   READING SCREEN — Bible Text
   ═══════════════════════════════════════════ */
.reading-header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
}

.reading-header-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px 8px;
}

.chapter-selector {
  display: flex; align-items: center; gap: 4px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 12px;
  font-family: var(--font-body);
  font-size: 0.82rem; font-weight: 600;
  color: var(--text-primary);
  cursor: pointer; transition: all 0.15s;
}
.chapter-selector:hover { background: var(--accent-soft); color: var(--accent); }
.chapter-selector .material-symbols-rounded { font-size: 18px; }

.reading-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 20px 10px;
}

.toolbar-group { display: flex; align-items: center; gap: 2px; }

.font-slider-container {
  display: flex; align-items: center; gap: 8px;
  width: 120px;
}
.font-slider-container span {
  font-size: 0.65rem; font-weight: 600; color: var(--text-tertiary);
  font-family: var(--font-display);
}
.font-slider-container span:last-child { font-size: 0.95rem; }

input[type="range"] {
  flex: 1; height: 4px;
  -webkit-appearance: none; appearance: none;
  background: var(--bg-elevated); border-radius: 2px;
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 18px; height: 18px;
  background: var(--accent); border-radius: 50%;
  cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}

.reading-content { padding: 24px 24px 120px; overflow-y: auto; flex: 1; }

.chapter-title {
  font-family: var(--font-display);
  font-size: 1.8rem; font-weight: 600;
  color: var(--text-primary);
  text-align: center;
  margin-bottom: 24px;
  letter-spacing: var(--tracking-tight);
}

.verse-text {
  font-family: var(--font-display);
  font-size: 1.15rem;
  line-height: 1.85;
  color: var(--text-primary);
  text-align: justify;
  hyphens: auto; -webkit-hyphens: auto;
}

.verse-num {
  font-family: var(--font-body);
  font-size: 0.65em;
  font-weight: 700;
  color: var(--accent);
  vertical-align: super;
  margin-right: 2px;
  line-height: 0;
  cursor: pointer;
}

.verse-highlight {
  background: var(--highlight-bg);
  border-radius: 3px;
  padding: 1px 0;
  transition: background 3s ease;
}
.verse-highlight.fade { background: transparent; }

.chapter-nav {
  display: flex; justify-content: space-between; align-items: center;
  padding: 24px 0 40px;
  border-top: 1px solid var(--border);
  margin-top: 32px;
}

.chapter-nav-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 10px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: 0.82rem; font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer; transition: all 0.15s;
}
.chapter-nav-btn:hover { background: var(--accent-soft); color: var(--accent); }
.chapter-nav-btn.disabled { opacity: 0.3; pointer-events: none; }
.chapter-nav-btn .material-symbols-rounded { font-size: 18px; }

/* ═══════════════════════════════════════════
   SEARCH RESULTS
   ═══════════════════════════════════════════ */
.search-results { padding: 0 20px 40px; overflow-y: auto; flex: 1; }

.search-result-count {
  font-size: 0.78rem; color: var(--text-tertiary);
  padding: 8px 0 16px; font-weight: 500;
}

.search-result-item {
  padding: 14px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  margin-bottom: 10px;
  cursor: pointer; transition: all 0.15s;
  box-shadow: var(--shadow-sm);
}
.search-result-item:hover {
  border-color: var(--accent-glow);
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}
.search-result-item:active { transform: translateY(0); }

.search-result-ref {
  font-family: var(--font-display);
  font-size: 0.95rem; font-weight: 600;
  color: var(--accent);
  margin-bottom: 6px;
}

.search-result-text {
  font-size: 0.85rem; line-height: 1.5;
  color: var(--text-secondary);
}
.search-result-text mark {
  background: var(--highlight-bg);
  color: var(--text-primary);
  border-radius: 2px; padding: 1px 2px;
  font-weight: 600;
}

.search-empty {
  text-align: center; padding: 60px 20px;
  color: var(--text-tertiary);
}
.search-empty .material-symbols-rounded { font-size: 48px; opacity: 0.3; display: block; margin-bottom: 12px; }
.search-empty p { font-size: 0.9rem; }

/* ═══════════════════════════════════════════
   CHAPTER DROPDOWN OVERLAY
   ═══════════════════════════════════════════ */
.chapter-dropdown-overlay {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  justify-content: center; align-items: flex-end;
}
.chapter-dropdown-overlay.active { display: flex; }

.chapter-dropdown {
  background: var(--bg-card);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  width: 100%; max-width: 480px;
  max-height: 60vh;
  padding: 20px;
  animation: slideUp 0.3s ease;
  overflow-y: auto;
}

.chapter-dropdown-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.chapter-dropdown-header h3 {

.chapter-dropdown-grid .chapter-btn.current {

/* ═══════════════════════════════════════════
   THEME PICKER
   ═══════════════════════════════════════════ */
.theme-overlay {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  justify-content: center; align-items: flex-end;
}
.theme-overlay.active { display: flex; }

.theme-panel {
  background: var(--bg-card);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  width: 100%; max-width: 480px;
  padding: 24px 20px;
  animation: slideUp 0.3s ease;
}

.theme-panel h3 {
  font-family: var(--font-display);
  font-size: 1.2rem; font-weight: 600;
  margin-bottom: 16px; text-align: center;
}

.theme-options {
  display: flex; gap: 12px; justify-content: center;
  margin-bottom: 20px;
}

.theme-option {
  width: 48px; height: 48px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer; transition: all 0.2s;
}
.theme-option.active { border-color: var(--accent); transform: scale(1.1); }
.theme-option[data-visual="classico"] { background: linear-gradient(135deg, #FAFAF7 50%, #78350F 50%); }
.theme-option[data-visual="serenidade"] { background: linear-gradient(135deg, #F0F4F8 50%, #3B6FA0 50%); }
.theme-option[data-visual="jovem"] { background: linear-gradient(135deg, #F5F0FA 50%, #7C3AED 50%); }
.theme-option[data-visual="minimalista"] { background: linear-gradient(135deg, #FFF 50%, #111 50%); }
.theme-option[data-visual="natureza"] { background: linear-gradient(135deg, #F4F6F0 50%, #5B7A3D 50%); }

.dark-toggle {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.dark-toggle span { font-size: 0.85rem; color: var(--text-secondary); font-weight: 500; }

.toggle-switch {
  width: 48px; height: 28px;
  background: var(--bg-elevated);
  border-radius: 14px;
  position: relative; cursor: pointer;
  border: 1px solid var(--border);
  transition: all 0.2s;
}
.toggle-switch::after {
  content: '';
  position: absolute; top: 3px; left: 3px;
  width: 20px; height: 20px;
  background: var(--text-tertiary);
  border-radius: 50%;
  transition: all 0.2s;
}
.toggle-switch.active { background: var(--accent); border-color: var(--accent); }
.toggle-switch.active::after { left: 23px; background: #FFF; }

/* ═══════════════════════════════════════════
   TOAST & VERSE ACTION
   ═══════════════════════════════════════════ */
.toast {
  position: fixed;
  bottom: 40px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text-primary); color: var(--bg);
  padding: 12px 24px;
  border-radius: 100px;
  font-size: 0.82rem; font-weight: 500;
  opacity: 0; transition: all 0.3s;
  z-index: 300;
  white-space: nowrap;
  box-shadow: var(--shadow-lg);
}
.toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

.verse-action-overlay {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  justify-content: center; align-items: flex-end;
}
.verse-action-overlay.active { display: flex; }

.verse-action-panel {
  background: var(--bg-card);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  width: 100%; max-width: 480px;
  padding: 24px 20px;
  animation: slideUp 0.3s ease;
}

.verse-action-panel .selected-verse {
  font-family: var(--font-display);
  font-size: 1.05rem; line-height: 1.6;
  color: var(--text-primary);
  padding: 16px;
  background: var(--bg-elevated);
  border-radius: var(--radius-md);
  margin-bottom: 16px;
  text-align: center;
  font-style: italic;
}
.verse-action-panel .selected-ref {
  font-size: 0.8rem; color: var(--accent);
  font-weight: 600; text-align: center;
  margin-bottom: 16px; font-style: normal;
}

.verse-actions { display: flex; gap: 12px; justify-content: center; }
.verse-action-btn {

.verse-action-btn:hover { background: var(--accent-soft); color: var(--accent); }

let currentBook = null;
let currentChapter = 1;
let currentScale = 1;
let isDark = false;
let selectedVerseNum = null;
let selectedVerseText = '';

/* ═══════════════════════════════════════════
   RENDERIZAR ÍNDICE
   ═══════════════════════════════════════════ */
function renderIndex() {
  const container = document.getElementById('index-content');
  const frag = document.createDocumentFragment();
  const testaments = [
    { key: 'AT', label: 'Antigo Testamento' },
    { key: 'NT', label: 'Novo Testamento' }
  ];

  testaments.forEach(function(t) {
    const label = document.createElement('div');
    label.className = 'testament-label';
    label.textContent = t.label;
    frag.appendChild(label);

    const books = BIBLE_BOOKS.filter(function(b) { return b.testament === t.key; });
    const seen = {};
    books.forEach(function(b) {
      if (!seen[b.category]) {
        seen[b.category] = [];
      }
      seen[b.category].push(b);
    });

    Object.keys(seen).forEach(function(cat) {
      const group = document.createElement('div');
      group.className = 'category-group';

      const catLabel = document.createElement('div');
      catLabel.className = 'category-label';
      catLabel.textContent = cat;
      group.appendChild(catLabel);

      const row = document.createElement('div');
      row.className = 'pills-row';

      seen[cat].forEach(function(b) {
        const pill = document.createElement('button');
        pill.className = b.isGospel ? 'book-pill gospel' : 'book-pill';
        pill.textContent = b.abbrev;
        pill.title = b.name;
        pill.addEventListener('click', function() { openBook(b.abbrev); });
        row.appendChild(pill);
      });

      group.appendChild(row);
      frag.appendChild(group);
    });
  });

  container.appendChild(frag);
}

/* ═══════════════════════════════════════════
   NAVEGAR — Livro → Capítulos
   ═══════════════════════════════════════════ */
function openBook(abbrev) {
  var book = BIBLE_BOOKS.find(function(b) { return b.abbrev === abbrev; });
  if (!book) return;
  currentBook = book;

  document.getElementById('chapters-book-name').textContent = book.name;
  document.getElementById('chapters-book-full-name').textContent = book.name;
  document.getElementById('chapters-book-meta').textContent =
    book.category + ' \u00B7 ' + book.chapters + ' capítulo' + (book.chapters > 1 ? 's' : '');

  var grid = document.getElementById('chapters-grid');
  grid.textContent = '';
  for (var i = 1; i <= book.chapters; i++) {
    (function(num) {
      var btn = document.createElement('button');
      btn.className = 'chapter-btn';
      if (SAMPLE_TEXTS[abbrev + '-' + num]) btn.className += ' has-text';
      btn.textContent = num;
      btn.addEventListener('click', function() { openChapter(num); });
      grid.appendChild(btn);
    })(i);
  }

  switchScreen('screen-chapters');
}

/* ═══════════════════════════════════════════
   NAVEGAR — Capítulo → Leitura
   ═══════════════════════════════════════════ */
function openChapter(num) {
  if (!currentBook) return;
  currentChapter = num;
  renderChapterText();
  switchScreen('screen-reading');
}

function renderChapterText() {
  var book = currentBook;
  var key = book.abbrev + '-' + currentChapter;
  var verses = SAMPLE_TEXTS[key];

  document.getElementById('reading-book-name').textContent = book.name;
  document.getElementById('reading-chapter-label').textContent = 'Cap. ' + currentChapter;

  var content = document.getElementById('reading-content');
  content.textContent = '';

  // Chapter title
  var title = document.createElement('div');
  title.className = 'chapter-title';
  title.textContent = book.name + ' ' + currentChapter;
  content.appendChild(title);

  if (verses) {
    var verseContainer = document.createElement('div');
    verseContainer.className = 'verse-text';

    verses.forEach(function(v, i) {
      var num = i + 1;
      var sup = document.createElement('span');
      sup.className = 'verse-num';
      sup.textContent = num;
      sup.id = 'v-' + num;
      sup.addEventListener('click', function() { selectVerse(num); });
      verseContainer.appendChild(sup);
      verseContainer.appendChild(document.createTextNode(v + ' '));
    });

    content.appendChild(verseContainer);
  } else {
    var placeholder = document.createElement('div');
    placeholder.className = 'verse-text';
    placeholder.style.textAlign = 'center';
    placeholder.style.color = 'var(--text-tertiary)';
    placeholder.style.padding = '60px 20px';

    var icon = document.createElement('span');
    icon.className = 'material-symbols-rounded';
    icon.style.fontSize = '48px';
    icon.style.display = 'block';
    icon.style.marginBottom = '12px';
    icon.style.opacity = '0.3';
    icon.textContent = 'book';
    placeholder.appendChild(icon);

    placeholder.appendChild(document.createTextNode(
      'Texto de ' + book.name + ' ' + currentChapter + ' será carregado na versão completa do app.'
    ));
    placeholder.appendChild(document.createElement('br'));
    placeholder.appendChild(document.createElement('br'));

    var hint = document.createElement('span');
    hint.style.fontSize = '0.85rem';
    hint.textContent = 'O protótipo inclui: Gn 1-3, Sl 23, Sl 91, Mt 1, Mt 28, Jo 1, 1Cor 13, Ap 1.';
    placeholder.appendChild(hint);

    content.appendChild(placeholder);
  }

  // Chapter navigation
  var nav = document.createElement('div');
  nav.className = 'chapter-nav';

  if (currentChapter > 1) {
    var prevBtn = document.createElement('button');
    prevBtn.className = 'chapter-nav-btn';
    var prevIcon = document.createElement('span');
    prevIcon.className = 'material-symbols-rounded';
    prevIcon.textContent = 'chevron_left';
    prevBtn.appendChild(prevIcon);
    prevBtn.appendChild(document.createTextNode(' Cap. ' + (currentChapter - 1)));
    prevBtn.addEventListener('click', function() { openChapter(currentChapter - 1); });
    nav.appendChild(prevBtn);
  } else {
    var prevDisabled = document.createElement('button');
    prevDisabled.className = 'chapter-nav-btn disabled';
    var pdIcon = document.createElement('span');
    pdIcon.className = 'material-symbols-rounded';
    pdIcon.textContent = 'chevron_left';
    prevDisabled.appendChild(pdIcon);
    prevDisabled.appendChild(document.createTextNode(' —'));
    nav.appendChild(prevDisabled);
  }

  var counter = document.createElement('span');
  counter.style.fontSize = '0.75rem';
  counter.style.color = 'var(--text-tertiary)';
  counter.style.fontWeight = '600';
  counter.textContent = currentChapter + ' / ' + book.chapters;
  nav.appendChild(counter);

  if (currentChapter < book.chapters) {
    var nextBtn = document.createElement('button');
    nextBtn.className = 'chapter-nav-btn';
    nextBtn.appendChild(document.createTextNode('Cap. ' + (currentChapter + 1) + ' '));
    var nextIcon = document.createElement('span');
    nextIcon.className = 'material-symbols-rounded';
    nextIcon.textContent = 'chevron_right';
    nextBtn.appendChild(nextIcon);
    nextBtn.addEventListener('click', function() { openChapter(currentChapter + 1); });
    nav.appendChild(nextBtn);
  } else {
    var nextDisabled = document.createElement('button');
    nextDisabled.className = 'chapter-nav-btn disabled';
    nextDisabled.appendChild(document.createTextNode('— '));
    var ndIcon = document.createElement('span');
    ndIcon.className = 'material-symbols-rounded';
    ndIcon.textContent = 'chevron_right';
    nextDisabled.appendChild(ndIcon);
    nav.appendChild(nextDisabled);
  }

  content.appendChild(nav);
  content.scrollTop = 0;
}

/* ═══════════════════════════════════════════
   VERSE SELECTION
   ═══════════════════════════════════════════ */
function selectVerse(num) {
  var key = currentBook.abbrev + '-' + currentChapter;
  var verses = SAMPLE_TEXTS[key];
  if (!verses || !verses[num - 1]) return;

  selectedVerseNum = num;
  selectedVerseText = verses[num - 1];

  document.getElementById('selected-verse-text').textContent = '\u201C' + selectedVerseText + '\u201D';
  document.getElementById('selected-verse-ref').textContent =
    currentBook.name + ' ' + currentChapter + ',' + num;

  document.getElementById('verse-action-overlay').classList.add('active');
}

function closeVerseAction(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('verse-action-overlay').classList.remove('active');
}

function copySelectedVerse() {
  var ref = currentBook.name + ' ' + currentChapter + ',' + selectedVerseNum;
  var text = '\u201C' + selectedVerseText + '\u201D\n\u2014 ' + ref + ' (Bíblia Ave Maria)';
  navigator.clipboard.writeText(text).then(function() { showToast('Versículo copiado'); });
  document.getElementById('verse-action-overlay').classList.remove('active');
}

function shareSelectedVerse() {
  var ref = currentBook.name + ' ' + currentChapter + ',' + selectedVerseNum;
  var text = '\u201C' + selectedVerseText + '\u201D\n\u2014 ' + ref + ' (Bíblia Ave Maria)\n\nVia Verbum App';
  if (navigator.share) {
    navigator.share({ text: text });
  } else {
    navigator.clipboard.writeText(text);
    showToast('Texto copiado para compartilhar');
  }
  document.getElementById('verse-action-overlay').classList.remove('active');
}

/* ═══════════════════════════════════════════
   COPY / SHARE CHAPTER
   ═══════════════════════════════════════════ */
function copyChapter() {
  var key = currentBook.abbrev + '-' + currentChapter;
  var verses = SAMPLE_TEXTS[key];
  if (!verses) { showToast('Texto não disponível neste protótipo'); return; }
  var text = currentBook.name + ' ' + currentChapter + '\n\n' +
    verses.map(function(v, i) { return (i + 1) + '. ' + v; }).join('\n') +
    '\n\n\u2014 Bíblia Ave Maria \u00B7 Via Verbum App';
  navigator.clipboard.writeText(text).then(function() { showToast('Capítulo copiado'); });
}

function shareChapter() {
  var key = currentBook.abbrev + '-' + currentChapter;
  var verses = SAMPLE_TEXTS[key];
  if (!verses) { showToast('Texto não disponível neste protótipo'); return; }
  var text = currentBook.name + ' ' + currentChapter + '\n\n' +
    verses.map(function(v, i) { return (i + 1) + '. ' + v; }).join('\n') +
    '\n\n\u2014 Bíblia Ave Maria \u00B7 Via Verbum App';
  if (navigator.share) { navigator.share({ text: text }); }
  else { navigator.clipboard.writeText(text); showToast('Texto copiado para compartilhar'); }
}

/* ═══════════════════════════════════════════
   CHAPTER DROPDOWN
   ═══════════════════════════════════════════ */
function openChapterDropdown() {
  document.getElementById('dropdown-book-name').textContent = currentBook.name;
  var grid = document.getElementById('dropdown-grid');
  grid.textContent = '';
  for (var i = 1; i <= currentBook.chapters; i++) {
    (function(num) {
      var btn = document.createElement('button');
      btn.className = num === currentChapter ? 'chapter-btn current' : 'chapter-btn';
      btn.textContent = num;
      btn.addEventListener('click', function() { selectChapterFromDropdown(num); });
      grid.appendChild(btn);
    })(i);
  }
  document.getElementById('chapter-dropdown').classList.add('active');
}

function closeChapterDropdown(e) {
  if (e && e.target && e.target !== e.currentTarget && !e.target.closest('.icon-btn')) return;
  document.getElementById('chapter-dropdown').classList.remove('active');
}

function selectChapterFromDropdown(num) {
  currentChapter = num;
  renderChapterText();
  document.getElementById('chapter-dropdown').classList.remove('active');
}

/* ═══════════════════════════════════════════
   BUSCA
   ═══════════════════════════════════════════ */
function normalizeStr(s) {
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function handleSearch(val) {
  if (val.length < 2) return;

  var lower = normalizeStr(val);
  var bookMatch = BIBLE_BOOKS.find(function(b) {
    return normalizeStr(b.name).indexOf(lower) !== -1 || normalizeStr(b.abbrev) === lower;
  });

  if (bookMatch) {
    var refMatch = val.match(/(\d+)\s*[,:]\s*(\d+)/);
    var chMatch = val.match(/\s+(\d+)$/);
    if (refMatch) {
      openBook(bookMatch.abbrev);
      setTimeout(function() { openChapter(parseInt(refMatch[1])); }, 100);
      return;
    } else if (chMatch) {
      openBook(bookMatch.abbrev);
      setTimeout(function() { openChapter(parseInt(chMatch[1])); }, 100);
      return;
    }
  }

  if (val.length >= 3) {
    document.getElementById('search-input-results').value = val;
    switchScreen('screen-search');
    performSearch(val);
  }
}

function handleSearchResults(val) {
  if (val.length < 3) {
    var container = document.getElementById('search-results');
    container.textContent = '';
    var empty = document.createElement('div');
    empty.className = 'search-empty';
    var icon = document.createElement('span');
    icon.className = 'material-symbols-rounded';
    icon.textContent = 'search';
    empty.appendChild(icon);
    var p = document.createElement('p');
    p.textContent = 'Digite ao menos 3 caracteres';
    empty.appendChild(p);
    container.appendChild(empty);
    return;
  }
  performSearch(val);
}

function performSearch(query) {
  var results = [];
  var lower = query.toLowerCase();

  Object.keys(SAMPLE_TEXTS).forEach(function(key) {
    var parts = key.split('-');
    var abbrev = parts[0];
    var ch = parts[1];
    var book = BIBLE_BOOKS.find(function(b) { return b.abbrev === abbrev; });
    if (!book) return;

    SAMPLE_TEXTS[key].forEach(function(verse, i) {
      if (verse.toLowerCase().indexOf(lower) !== -1) {
        results.push({
          bookAbbrev: abbrev, bookName: book.name,
          chapter: parseInt(ch), verseNum: i + 1, text: verse,
        });
      }
    });
  });

  var container = document.getElementById('search-results');
  container.textContent = '';

  if (results.length === 0) {
    var empty = document.createElement('div');
    empty.className = 'search-empty';
    var icon = document.createElement('span');
    icon.className = 'material-symbols-rounded';
    icon.textContent = 'search_off';
    empty.appendChild(icon);
    var p1 = document.createElement('p');
    p1.textContent = 'Nenhum resultado para "' + query + '"';
    empty.appendChild(p1);
    var p2 = document.createElement('p');
    p2.style.fontSize = '0.78rem';
    p2.style.marginTop = '8px';
    p2.style.color = 'var(--text-tertiary)';
    p2.textContent = 'O protótipo busca nos textos de amostra disponíveis';
    empty.appendChild(p2);
    container.appendChild(empty);
    return;
  }

  var countDiv = document.createElement('div');
  countDiv.className = 'search-result-count';
  countDiv.textContent = results.length + ' resultado' + (results.length > 1 ? 's' : '');
  container.appendChild(countDiv);

  results.forEach(function(r) {
    var item = document.createElement('div');
    item.className = 'search-result-item';
    item.addEventListener('click', function() {
      goToSearchResult(r.bookAbbrev, r.chapter, r.verseNum);
    });

    var ref = document.createElement('div');
    ref.className = 'search-result-ref';
    ref.textContent = r.bookName + ' ' + r.chapter + ',' + r.verseNum;
    item.appendChild(ref);

    var textDiv = document.createElement('div');
    textDiv.className = 'search-result-text';

    // Highlight matches safely using DOM
    var lowerText = r.text.toLowerCase();
    var lowerQuery = query.toLowerCase();
    var idx = 0;
    var pos;
    while ((pos = lowerText.indexOf(lowerQuery, idx)) !== -1) {
      if (pos > idx) textDiv.appendChild(document.createTextNode(r.text.substring(idx, pos)));
      var mark = document.createElement('mark');
      mark.textContent = r.text.substring(pos, pos + query.length);
      textDiv.appendChild(mark);
      idx = pos + query.length;
    }
    if (idx < r.text.length) textDiv.appendChild(document.createTextNode(r.text.substring(idx)));

    item.appendChild(textDiv);
    container.appendChild(item);
  });
}

function goToSearchResult(abbrev, chapter, verse) {
  openBook(abbrev);
  setTimeout(function() {
    openChapter(chapter);
    setTimeout(function() {
      var vEl = document.getElementById('v-' + verse);
      if (vEl) {
        vEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }, 200);
  }, 100);
}

function clearSearch() {
  document.getElementById('search-input').value = '';
}

/* ═══════════════════════════════════════════
   DEEP LINK (simulação)
   ═══════════════════════════════════════════ */
function deepLink(ref) {
  var match = ref.match(/^(\w+)\s+(\d+)(?:[,:](\d+))?/);
  if (!match) return;
  var abbrev = match[1];
  var ch = parseInt(match[2]);
  var vStart = match[3] ? parseInt(match[3]) : null;

  var book = BIBLE_BOOKS.find(function(b) {
    return b.abbrev.toLowerCase() === abbrev.toLowerCase() ||
           b.name.toLowerCase() === abbrev.toLowerCase();
  });
  if (!book) return;

  openBook(book.abbrev);
  setTimeout(function() {
    openChapter(ch);
    if (vStart) {
      setTimeout(function() {
        var vEl = document.getElementById('v-' + vStart);
        if (vEl) vEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 200);
    }
  }, 100);
}

/* ═══════════════════════════════════════════
   SCREEN NAVIGATION
   ═══════════════════════════════════════════ */
function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function goToIndex() { switchScreen('screen-index'); }
function goToChapters() {
  if (currentBook) openBook(currentBook.abbrev);
  else goToIndex();
}

/* ═══════════════════════════════════════════
   SWIPE NAVIGATION
   ═══════════════════════════════════════════ */
var touchStartX = 0;
var touchStartY = 0;

document.addEventListener('touchstart', function(e) {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', function(e) {
  if (!document.getElementById('screen-reading').classList.contains('active')) return;
  var dx = e.changedTouches[0].clientX - touchStartX;
  var dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 80 && Math.abs(dx) > Math.abs(dy) * 2) {
    if (dx > 0 && currentChapter > 1) openChapter(currentChapter - 1);
    else if (dx < 0 && currentChapter < currentBook.chapters) openChapter(currentChapter + 1);
  }
});

/* ═══════════════════════════════════════════
   FONT SIZE
   ═══════════════════════════════════════════ */
function changeFontSize(val) {
  currentScale = parseFloat(val);
  document.documentElement.style.setProperty('--font-scale', currentScale);
}

/* ═══════════════════════════════════════════
   THEMES
   ═══════════════════════════════════════════ */
function openThemePicker() {
  document.getElementById('theme-overlay').classList.add('active');
}

function closeThemePicker(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('theme-overlay').classList.remove('active');
}

function setVisualTheme(theme) {
  if (theme === 'classico') document.documentElement.removeAttribute('data-visual');
  else document.documentElement.setAttribute('data-visual', theme);
  document.querySelectorAll('.theme-option').forEach(function(o) { o.classList.remove('active'); });
  document.querySelector('.theme-option[data-visual="' + theme + '"]').classList.add('active');
}

function toggleDarkMode() {
  isDark = !isDark;
  document.getElementById('dark-toggle').classList.toggle('active', isDark);
  if (isDark) document.documentElement.setAttribute('data-theme', 'dark');
  else document.documentElement.removeAttribute('data-theme');
}

/* ═══════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════ */
function showToast(msg) {
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('visible');
  setTimeout(function() { toast.classList.remove('visible'); }, 2000);
}

/* ═══════════════════════════════════════════
   KEYBOARD — ESC
   ═══════════════════════════════════════════ */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.getElementById('chapter-dropdown').classList.remove('active');
    document.getElementById('theme-overlay').classList.remove('active');
    document.getElementById('verse-action-overlay').classList.remove('active');
    var active = document.querySelector('.screen.active');
    if (active.id === 'screen-reading') goToChapters();
    else if (active.id === 'screen-chapters') goToIndex();
    else if (active.id === 'screen-search') { goToIndex(); clearSearch(); }
  }
});

/* ═══ INIT ═══ */
renderIndex();
</script>
</body>
</html>
